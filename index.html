<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Mode PDF</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap');
 
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --accent: #e8ff47;
    --text: #f0f0f0;
    --muted: #555;
    --success: #47ffb2;
    --error: #ff4747;
  }
 
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    overflow-x: hidden;
  }
 
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1rem;
    gap: 0;
  }
 
  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 128px;
    z-index: 0;
  }
 
  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }
 
  header {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
 
  .logo {
    font-family: 'Fraunces', serif;
    font-size: 2rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text);
  }
 
  .logo span { color: var(--accent); }
 
  .tagline {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
 
  .drop-zone {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }
 
  .drop-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(232,255,71,0.04) 0%, transparent 70%);
    pointer-events: none;
  }
 
  .drop-zone:hover, .drop-zone.over {
    border-color: var(--accent);
    background: #131300;
  }
 
  .drop-zone input { display: none; }
 
  .drop-icon {
    width: 40px;
    height: 40px;
    margin: 0 auto 1rem;
    opacity: 0.3;
  }
 
  .drop-title {
    font-family: 'Fraunces', serif;
    font-size: 1.1rem;
    font-weight: 300;
    font-style: italic;
    color: var(--text);
    margin-bottom: 0.4rem;
  }
 
  .drop-sub {
    color: var(--muted);
    font-size: 11px;
  }
 
  .options {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.25rem;
  }
 
  .options-title {
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }
 
  .option-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
 
  .option-label {
    color: var(--text);
    font-size: 12px;
  }
 
  .presets {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
 
  .preset-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
 
  .preset-btn:hover { border-color: var(--accent); color: var(--accent); }
  .preset-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(232,255,71,0.06); }
 
  .color-pair {
    display: flex;
    gap: 8px;
    align-items: center;
  }
 
  .color-field {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 4px 8px;
    font-size: 11px;
    color: var(--muted);
  }
 
  .color-field input[type=color] {
    width: 18px; height: 18px;
    border: none; padding: 0;
    background: none;
    cursor: pointer;
    border-radius: 1px;
    outline: none;
  }
 
  .color-field span { font-family: 'DM Mono', monospace; font-size: 10px; }
 
  /* File info bar */
  .file-bar {
    display: none;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.75rem 1rem;
    gap: 1rem;
  }
 
  .file-bar.visible { display: flex; }
 
  .file-name {
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
 
  .file-meta { color: var(--muted); font-size: 10px; white-space: nowrap; }
 
  /* Convert button */
  .convert-btn {
    background: var(--accent);
    border: none;
    border-radius: 4px;
    color: #0a0a0a;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 1rem 2rem;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    width: 100%;
    display: none;
  }
 
  .convert-btn.visible { display: block; }
  .convert-btn:hover { opacity: 0.88; }
  .convert-btn:active { transform: scale(0.99); }
  .convert-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
 
  /* Progress */
  .progress-wrap {
    display: none;
    flex-direction: column;
    gap: 0.5rem;
  }
 
  .progress-wrap.visible { display: flex; }
 
  .progress-track {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
  }
 
  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
    border-radius: 1px;
  }
 
  .progress-label {
    color: var(--muted);
    font-size: 11px;
  }
 
  /* Status */
  .status {
    font-size: 11px;
    padding: 0.6rem 0.75rem;
    border-radius: 2px;
    display: none;
  }
 
  .status.success { display: block; color: var(--success); background: rgba(71,255,178,0.06); border: 1px solid rgba(71,255,178,0.15); }
  .status.error { display: block; color: var(--error); background: rgba(255,71,71,0.06); border: 1px solid rgba(255,71,71,0.15); }
 
  .note {
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.03em;
    text-align: center;
    line-height: 1.6;
  }
 
  .note a { color: var(--muted); text-decoration: underline; }
</style>
</head>
<body>
<div class="grain"></div>
 
<div class="container">
  <header>
    <div class="logo">dark<span>.</span>pdf</div>
    <div class="tagline">Black background · searchable text · GoodNotes ready</div>
  </header>
 
  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" accept=".pdf">
    <svg class="drop-icon" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="8" y="4" width="18" height="24" rx="2"/>
      <path d="M20 4l6 6h-6V4z"/>
      <path d="M20 22v10m-4-4l4 4 4-4"/>
    </svg>
    <div class="drop-title">Drop your PDF here</div>
    <div class="drop-sub">or tap to browse</div>
  </div>
 
  <div class="options">
    <div class="options-title">Style</div>
 
    <div>
      <div class="presets" id="presets">
        <button class="preset-btn active" onclick="setPreset(this,'#000000','#f0f0f0')">Pure black</button>
        <button class="preset-btn" onclick="setPreset(this,'#0d1117','#e6edf3')">GitHub dark</button>
        <button class="preset-btn" onclick="setPreset(this,'#1a1a2e','#e8e8e8')">Deep navy</button>
        <button class="preset-btn" onclick="setPreset(this,'#1e1e1e','#d4d4d4')">VS Code</button>
        <button class="preset-btn" onclick="setPreset(this,'#000000','#ffd700')">Gold ink</button>
      </div>
    </div>
 
    <div class="option-row">
      <span class="option-label">Custom colors</span>
      <div class="color-pair">
        <div class="color-field">
          <span>BG</span>
          <input type="color" id="bgColor" value="#000000" oninput="document.getElementById('bgHex').textContent=this.value; clearPreset()">
          <span id="bgHex">#000000</span>
        </div>
        <div class="color-field">
          <span>FG</span>
          <input type="color" id="fgColor" value="#f0f0f0" oninput="document.getElementById('fgHex').textContent=this.value; clearPreset()">
          <span id="fgHex">#f0f0f0</span>
        </div>
      </div>
    </div>
  </div>
 
  <div class="file-bar" id="fileBar">
    <div>
      <div class="file-name" id="fileName">—</div>
      <div class="file-meta" id="fileMeta">—</div>
    </div>
  </div>
 
  <button class="convert-btn" id="convertBtn" onclick="convert()">Convert to dark mode</button>
 
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label" id="progressLabel">Processing…</div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>
 
  <div class="status" id="statusMsg"></div>
 
  <p class="note">Your PDF never leaves your device — everything runs locally in your browser.<br>Works on iPad · iPhone · Mac · Windows</p>
</div>
 
<script>
let pdfFile = null;
 
// Drag and drop
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f?.type === 'application/pdf') loadFile(f);
});
document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});
 
function loadFile(f) {
  pdfFile = f;
  document.getElementById('fileName').textContent = f.name;
  document.getElementById('fileMeta').textContent = `${(f.size/1024).toFixed(0)} KB`;
  document.getElementById('fileBar').classList.add('visible');
  document.getElementById('convertBtn').classList.add('visible');
  document.getElementById('statusMsg').className = 'status';
}
 
function setPreset(btn, bg, fg) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('bgColor').value = bg;
  document.getElementById('fgColor').value = fg;
  document.getElementById('bgHex').textContent = bg;
  document.getElementById('fgHex').textContent = fg;
}
 
function clearPreset() {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
}
 
function hexToRgb01(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  return [r,g,b];
}
 
function toFixed3(n) { return Math.round(n*1000)/1000; }
 
function setProgress(pct, label) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = label;
}
 
function showStatus(type, msg) {
  const el = document.getElementById('statusMsg');
  el.className = 'status ' + type;
  el.textContent = msg;
}
 
async function convert() {
  if (!pdfFile) return;
 
  const bgHex = document.getElementById('bgColor').value;
  const fgHex = document.getElementById('fgColor').value;
  const [bgR, bgG, bgB] = hexToRgb01(bgHex);
  const [fgR, fgG, fgB] = hexToRgb01(fgHex);
 
  const btn = document.getElementById('convertBtn');
  btn.disabled = true;
  document.getElementById('progressWrap').classList.add('visible');
  document.getElementById('statusMsg').className = 'status';
 
  try {
    setProgress(5, 'Reading PDF…');
    const arrayBuffer = await pdfFile.arrayBuffer();
    const { PDFDocument, rgb } = PDFLib;
    const pdfDoc = await PDFDocument.load(arrayBuffer, { ignoreEncryption: true });
    const pages = pdfDoc.getPages();
    const total = pages.length;
 
    for (let i = 0; i < total; i++) {
      setProgress(5 + (i / total) * 88, `Converting page ${i+1} of ${total}…`);
 
      const page = pages[i];
      const { width, height } = page.getSize();
 
      // Draw black background rectangle behind all content
      // We insert it at the very beginning of the page content stream
      const bgStream = `q ${toFixed3(bgR)} ${toFixed3(bgG)} ${toFixed3(bgB)} rg 0 0 ${toFixed3(width)} ${toFixed3(height)} re f Q\n`;
 
      // Get existing content streams and prepend bg
      const contentRefs = page.node.Contents();
      if (contentRefs) {
        // Insert background as a new stream prepended to the content
        const bgBytes = new TextEncoder().encode(bgStream);
        const bgStreamRef = pdfDoc.context.flateStream(bgBytes);
        const bgRef = pdfDoc.context.register(bgStreamRef);
 
        if (contentRefs.constructor.name === 'PDFArray') {
          contentRefs.insert(0, bgRef);
        } else {
          // Single stream ref - make it an array
          const arr = pdfDoc.context.obj([bgRef, contentRefs]);
          page.node.set(PDFLib.PDFName.of('Contents'), arr);
        }
      }
 
      // Now recolor: iterate content streams and swap colors
      // Re-fetch content refs after modification
      const rawStreams = page.node.Contents();
      const refsToProcess = rawStreams?.constructor.name === 'PDFArray'
        ? Array.from({length: rawStreams.size()}, (_,j) => rawStreams.get(j))
        : rawStreams ? [rawStreams] : [];
 
      for (const ref of refsToProcess) {
        try {
          const streamObj = pdfDoc.context.lookup(ref);
          if (!streamObj || !streamObj.contents) continue;
          let raw = new TextDecoder('latin1').decode(streamObj.contents);
 
          // Skip the bg stream we just added (starts with our marker)
          if (raw.startsWith('q ') && raw.includes(' re f Q')) continue;
 
          const fgStr = `${toFixed3(fgR)} ${toFixed3(fgG)} ${toFixed3(fgB)}`;
 
          // White fills (ICC RGB: "1 1 1 sc", plain RGB: "1 1 1 rg") -> bg color
          const bgStr = `${toFixed3(bgR)} ${toFixed3(bgG)} ${toFixed3(bgB)}`;
          raw = raw.replace(/1 1 1 sc/g, `${bgStr} sc`);
          raw = raw.replace(/1 1 1 rg/g, `${bgStr} rg`);
          raw = raw.replace(/1 1 1 RG/g, `${bgStr} RG`);
 
          // Grayscale white "1 sc" / "1 g" -> bg
          const bgGray = toFixed3((bgR*0.299 + bgG*0.587 + bgB*0.114));
          raw = raw.replace(/(?<![0-9.])1 sc(?![0-9])/g, `${bgGray} sc`);
          raw = raw.replace(/(?<![0-9.])1 g(?![0-9a-z])/g, `${bgGray} g`);
 
          // CMYK black "0 0 0 1 k" -> CMYK white "0 0 0 0 k"
          raw = raw.replace(/0 0 0 1 k/g, '0 0 0 0 k');
          raw = raw.replace(/0 0 0 1 K/g, '0 0 0 0 K');
 
          // RGB black -> fg color
          raw = raw.replace(/0 0 0 rg/g, `${fgStr} rg`);
          raw = raw.replace(/0 0 0 RG/g, `${fgStr} RG`);
          raw = raw.replace(/0 0 0 sc/g, `${fgStr} sc`);
 
          // Grayscale black -> fg gray
          const fgGray = toFixed3((fgR*0.299 + fgG*0.587 + fgB*0.114));
          raw = raw.replace(/(?<![0-9.])0 sc(?![0-9])/g, `${fgGray} sc`);
          raw = raw.replace(/(?<![0-9.])0 g(?![0-9a-z])/g, `${fgGray} g`);
 
          const newBytes = new TextEncoder().encode(raw);
          streamObj.contents = newBytes;
          // Clear cached stream length
          streamObj.dict.set(PDFLib.PDFName.of('Length'), pdfDoc.context.obj(newBytes.length));
          streamObj.dict.delete(PDFLib.PDFName.of('Filter'));
 
        } catch(e) { /* skip problematic streams */ }
      }
 
      // Yield to UI
      await new Promise(r => setTimeout(r, 0));
    }
 
    setProgress(96, 'Saving PDF…');
    const pdfBytes = await pdfDoc.save();
 
    setProgress(100, 'Done!');
 
    // Trigger download
    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = pdfFile.name.replace(/\.pdf$/i, '_dark.pdf');
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
 
    showStatus('success', `✓ Saved as "${pdfFile.name.replace(/\.pdf$/i, '_dark.pdf')}" — check your Downloads folder.`);
 
  } catch (err) {
    showStatus('error', `Error: ${err.message}`);
    console.error(err);
  } finally {
    btn.disabled = false;
    document.getElementById('progressWrap').classList.remove('visible');
  }
}
</script>
</body>
</html>
